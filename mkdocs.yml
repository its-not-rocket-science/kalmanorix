# MkDocs configuration for Kalmanorix documentation
# https://www.mkdocs.org/user-guide/configuration/
# https://squidfunk.github.io/mkdocs-material/

site_name: Kalmanorix
site_description: Efficient Specialist Fusion with Kalman Filtering
site_author: Kalmanorix Contributors
site_url: https://its-not-rocket-science.github.io/kalmanorix/

# Repository
repo_name: its-not-rocket-science/kalmanorix
repo_url: https://github.com/its-not-rocket-science/kalmanorix

# Copyright
copyright: Copyright &copy; 2026 Kalmanorix Contributors

# Theme
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search
  - gen-files:
      scripts:
        - docs/generate_api.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_category_heading: true
            heading_level: 3
            merge_init_into_class: true
            show_submodules: false
            filters:
              - "!^_"  # exclude private members

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3

# Extra CSS and JavaScript
extra_css:
  - css/extra.css
extra_javascript:
  - js/extra.js

# Extra
extra:
  version: 0.1.0
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/its-not-rocket-science/kalmanorix
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/kalmanorix/
  # analytics:
  #   provider: google
  #   property: !ENV GOOGLE_ANALYTICS_KEY

# Page tree (will be generated by literate-nav, but provide fallback)
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Examples: getting-started/examples.md
  - Concepts:
    - Kalman Fusion: concepts/kalman-fusion.md
    - Specialist Embeddings: concepts/specialist-embeddings.md
    - Uncertainty Estimation: concepts/uncertainty-estimation.md
    - Alignment: concepts/alignment.md
  - API Reference:
    - Village: api-reference/village.md
    - Panoramix: api-reference/panoramix.md
    - Scout Router: api-reference/scout-router.md
    - Embedder Adapters: api-reference/embedder-adapters.md
    - Kalman Engine: api-reference/kalman-engine.md
    - Alignment: api-reference/alignment.md
  - Guides:
    - Creating Specialists: guides/creating-specialists.md
    - Fusion Strategies: guides/fusion-strategies.md
    - Uncertainty Calibration: guides/uncertainty-calibration.md
    - Deployment: guides/deployment.md
    - Production Deployment Audit (2026-04): guides/production-deployment-audit-2026-04.md
    - API Usage: guides/api-usage.md
  - Examples:
    - Minimal Fusion: examples/minimal-fusion.md
    - HuggingFace Integration: examples/huggingface-integration.md
    - API Server: examples/api-server.md
    - Interactive Demo: examples/interactive-demo.md
    - Multi-Domain Search Tutorial: examples/multi-domain-search-tutorial.md
    - Real-Time Semantic Search: examples/real-time-semantic-search.md
    - Cross-Lingual Fusion: examples/cross-lingual-fusion.md
  - Research:
    - Experiments: research/experiments.md
    - Results: research/results.md
    - Preregistered Evaluation Protocol: research/preregistered-evaluation-protocol.md
    - Statistical Comparison Framework: research/statistical-comparison-framework.md
    - Mixed-Domain Retrieval Benchmark: research/mixed-domain-retrieval-benchmark.md
    - Real Specialist Implementation Plan: research/real-specialist-implementation-plan.md
    - Milestones:
      - Overview: milestones/index.md
      - Specialist Drift Breaks Fusion: milestones/0001-specialist-drift-breaks-fusion.md
  - Contributing:
    - Model Contributors: contributing/model-contributors.md
    - Development: contributing/development.md
    - Testing: contributing/testing.md
    - Roadmap: contributing/roadmap.md

# Validation
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

# Watch (for development)
watch:
  - docs
  - src
