name: Deploy Documentation
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'src/kalmanorix/**'  # Docstrings affect API docs
  # Allow manual trigger
  workflow_dispatch:

# Grant write permissions for deploying to GitHub Pages
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[docs]"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        # Use mkdocs gh-deploy which handles everything
        run: mkdocs gh-deploy --force

      # Optional: Verify the deployment
      - name: Verify deployment
        run: |
          echo "Documentation deployed to GitHub Pages"
          echo "Site URL: https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/"
